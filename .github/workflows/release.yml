name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT: sfdel

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp sfdel.sh dist/sfdel.sh
          chmod +x dist/sfdel.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sfdel.sh > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/sfdel.sh
            dist/SHA256SUMS
          body: |
            ## ${{ env.PROJECT }} ${{ steps.version.outputs.tag }}

            ### Artifacts
            - `sfdel.sh` — Executable script
            - `SHA256SUMS` — Checksums

            ### Quick Install
            ```bash
            curl -fsSL -o sfdel.sh "https://github.com/lynicis/${{ env.PROJECT }}/releases/download/${{ steps.version.outputs.tag }}/sfdel.sh"
            chmod +x sfdel.sh
            ./sfdel.sh
            ```

      - name: Ensure tap and bucket repos exist
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          for repo in "homebrew-tap" "scoop-bucket"; do
            if ! gh repo view "lynicis/$repo" &>/dev/null; then
              gh repo create "lynicis/$repo" --public \
                --description "$repo for ${{ env.PROJECT }}" --confirm
            fi
          done

      - name: Publish to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE_URL="https://github.com/lynicis/${{ env.PROJECT }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$ARCHIVE_URL" | sha256sum | awk '{print $1}')

          git clone "https://x-access-token:${GH_TOKEN}@github.com/lynicis/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > "Formula/${{ env.PROJECT }}.rb" <<RUBY
          class Sfdel < Formula
            desc "Delete Safari browsing history on macOS"
            homepage "https://github.com/lynicis/${{ env.PROJECT }}"
            url "${ARCHIVE_URL}"
            sha256 "${SHA}"
            license "MIT"

            def install
              bin.install "sfdel.sh" => "sfdel"
            end

            test do
              assert_match "sfdel", shell_output("#{bin}/sfdel --version")
            end
          end
          RUBY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "${{ env.PROJECT }} ${TAG}"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Publish to Scoop bucket
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          JUST_SH_URL="https://github.com/lynicis/${{ env.PROJECT }}/releases/download/${TAG}/sfdel.sh"
          SHA=$(curl -sL "$JUST_SH_URL" | sha256sum | awk '{print $1}')

          git clone "https://x-access-token:${GH_TOKEN}@github.com/lynicis/scoop-bucket.git"
          cd scoop-bucket
          mkdir -p bucket

          cat > "bucket/${{ env.PROJECT }}.json" <<JSON
          {
            "version": "${TAG#v}",
            "description": "Delete Safari browsing history on macOS",
            "homepage": "https://github.com/lynicis/${{ env.PROJECT }}",
            "license": "MIT",
            "url": "${JUST_SH_URL}",
            "hash": "${SHA}",
            "bin": "sfdel"
          }
          JSON

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "${{ env.PROJECT }} ${TAG}"
            git push
          else
            echo "No changes to commit"
          fi
